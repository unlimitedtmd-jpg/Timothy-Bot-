<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ ∆RY∆N-X min ⚡</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        @keyframes rgbMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes glassShimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        :root { --primary: #00f3ff; --secondary: #0077ff; }
        body { 
            background: radial-gradient(ellipse at 20% 20%, #001a3a 0%, #000d1f 40%, #000508 100%);
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0;
            font-family: 'Rajdhani', sans-serif; 
        }

        .main-wrapper {
            position: relative;
            padding: 2px;
            background: linear-gradient(90deg, #0033ff, #00aaff, #00f3ff, #0055ff, #0033ff);
            background-size: 200% 200%;
            animation: rgbMove 3s linear infinite;
            border-radius: 15px;
            max-width: 350px;
            width: 90%;
            margin: 20px auto;
            box-shadow: 0 0 40px rgba(0, 170, 255, 0.3), 0 0 80px rgba(0, 100, 255, 0.15);
        }

        .inner-content {
            background: linear-gradient(135deg, rgba(0, 20, 60, 0.92) 0%, rgba(0, 10, 30, 0.97) 60%, rgba(0, 5, 20, 0.98) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 20px; 
            border-radius: 12px; 
            text-align: center;
            border: 1px solid rgba(0, 200, 255, 0.15);
            position: relative;
            overflow: hidden;
        }

        h1 {
            font-family: 'Orbitron'; 
            font-size: 1.8rem; 
            color: #fff; 
            text-shadow: 0 0 10px #00f3ff, 0 0 30px rgba(0, 150, 255, 0.5); 
            font-weight: 900; 
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        .status-line {
            font-weight: 800; 
            font-size: 0.9rem; 
            margin-bottom: 5px; 
            letter-spacing: 1px;
            color: #7ab8d4;
        }

        .bot-counter {
            font-family: 'Orbitron';
            font-size: 0.75rem;
            color: #00aaff;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .input-box {
            position: relative; padding: 2px; 
            background: linear-gradient(90deg, #00f3ff, #0055ff, #00f3ff); 
            background-size: 200%; 
            animation: rgbMove 2s linear infinite; 
            border-radius: 10px; 
            margin-bottom: 20px;
        }

        input {
            width: 100%; padding: 15px;
            background: rgba(0, 10, 30, 0.9); border: none;
            color: #00f3ff; font-family: 'Orbitron';
            font-size: 1rem; font-weight: bold;
            text-align: center; border-radius: 8px;
            outline: none; box-sizing: border-box;
        }

        .btn-box {
            position: relative; padding: 2px; 
            background: linear-gradient(90deg, #003399, #0055ff, #00aaff, #003399); 
            background-size: 200%; 
            animation: rgbMove 1.5s linear infinite; 
            border-radius: 10px;
        }

        button {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, rgba(0, 20, 60, 0.95) 0%, rgba(0, 10, 40, 0.98) 100%);
            color: #fff; border: none;
            font-family: 'Orbitron'; font-size: 1.2rem;
            font-weight: 900; cursor: pointer;
            border-radius: 8px; text-transform: uppercase;
        }

        .code-display {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem; color: #00aaff;
            text-shadow: 0 0 15px #00aaff; letter-spacing: 5px;
            border: 1px dashed rgba(0, 180, 255, 0.6);
            padding: 10px; margin-top: 10px;
            background: rgba(0, 50, 120, 0.2); border-radius: 6px;
        }

        .loader {
            border: 3px solid rgba(0, 100, 255, 0.15);
            border-top: 3px solid #00f3ff;
            border-radius: 50%; width: 30px; height: 30px;
            animation: spin 1s linear infinite; margin: 0 auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="inner-content">
        <h1>ARYAN-X BOT</h1>
        <div class="status-line">⚡ SYSTEM IS <span style="color:#00f3ff;">ACTIVE ⚡</span></div>
        <div class="bot-counter">Bots Connected: <span id="count-num" style="color:#fff;">0</span> / 1000</div>
        <div class="input-box">
            <input type="text" id="number" placeholder="254..." autocomplete="off">
        </div>
        <div class="btn-box">
            <button onclick="getCode()">⚡ PAIR ⚡</button>
        </div>
        <div id="result" style="margin-top: 20px; font-weight: 900; font-size: 1.1rem; color: #00aaff; min-height: 60px;"></div>
        <footer style="margin-top: 20px; font-weight: 800; color: #fff; font-size: 0.75rem; opacity: 0.7;">
            ⚡ ∆RY∆N-X WHATSAPP BOT ⚡
        </footer>
    </div>
</div>

<script>
    const MAX_BOTS = 1000;
    let currentBots = parseInt(localStorage.getItem('teddy_xmd_bot_count')) || 0;
    document.getElementById('count-num').innerText = currentBots;

    async function getCode() {
        const numberInput = document.getElementById("number");
        const resDiv = document.getElementById("result");
        let num = numberInput.value.replace(/[^0-9]/g, '');

        if (!num) {
            resDiv.innerHTML = "<span style='color:#ff0055;'>ENTER NUMBER FIRST! ⚡</span>";
            return;
        }

        resDiv.innerHTML = '<div class="loader"></div><div style="margin-top:10px; font-size:0.8rem;">STARTING SESSION... ⚡</div>';

        // Setup a Timeout so it doesn't hang forever
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 20000); // 20 seconds

        try {
            // Using absolute path ensures it hits the same server hosting the file
            const response = await fetch(`/code?number=${num}`, { signal: controller.signal });
            const data = await response.json();

            clearTimeout(timeoutId);

            if (data.code) {
                resDiv.innerHTML = `
                    <div style="font-size:0.8rem; color:#aaa">PAIRING CODE:</div>
                    <div class="code-display" onclick="copyCode('${data.code}')">${data.code}</div>
                `;
                currentBots++;
                localStorage.setItem('teddy_xmd_bot_count', currentBots);
                document.getElementById('count-num').innerText = currentBots;
            } else {
                resDiv.innerHTML = "<span style='color:#ff0055'>[ERROR] SERVER REJECTED REQUEST</span>";
            }
        } catch (e) {
            if (e.name === 'AbortError') {
                // Since your inconnuboy.js hangs if connected, we treat timeout as 'already active'
                resDiv.innerHTML = "<span style='color:#0f0;'>SESSION ACTIVE OR TIMEOUT ⚡<br><small style='font-size:0.7rem;'>Check your WhatsApp</small></span>";
            } else {
                resDiv.innerHTML = "<span style='color:#ff0055'>[CRITICAL] CANNOT REACH SERVER</span>";
                console.error(e);
            }
        }
    }

    function copyCode(code) {
        navigator.clipboard.writeText(code);
        const display = document.querySelector('.code-display');
        display.innerText = "COPIED! ✅";
        setTimeout(() => { display.innerText = code; }, 1500);
    }
</script>
</body>
</html>
